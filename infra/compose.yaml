services:
  traefik:
    image: traefik:v3.3
    container_name: ${STACK_NAME}-traefik
    command:
      - --log.level=${TRAEFIK_LOG_LEVEL}
    ports:
      - "${TRAEFIK_HTTP_PORT}:80"
      - "${TRAEFIK_HTTPS_PORT}:443"
      - "${TRAEFIK_DASHBOARD_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml
      - /etc/ssl/:/etc/ssl/
    networks:
      - default

  app:
    image: ${APP_IMAGE}
    container_name: ${STACK_NAME}-app
    working_dir: /var/www/app
    command: sh -c "sleep infinity"
    volumes:
      - ../app:/var/www/app
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`app.${STACK_DOMAIN}`)
      - traefik.http.routers.app.entrypoints=web
      - traefik.http.services.app.loadbalancer.server.port=${APP_PORT}
    networks:
      - default

  api:
    image: ${API_IMAGE}
    container_name: ${STACK_NAME}-api
    working_dir: /var/www/api
    command: sh -c "sleep infinity"
    volumes:
      - ../api:/var/www/api
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.${STACK_DOMAIN}`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.services.api.loadbalancer.server.port=${API_PORT}
    depends_on:
      - postgres
      - redis
    networks:
      - default

  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: ${STACK_NAME}-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - default

  redis:
    image: ${REDIS_IMAGE}
    container_name: ${STACK_NAME}-redis
    networks:
      - default

networks:
  default:
    name: ${NETWORK_NAME}
    external: true

volumes:
  postgres-data: